name: Streamic Auto Build

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  SITE_BASE_URL: "https://www.thestreamic.in"

jobs:
  build:
    name: Fetch RSS + Generate Originals + Build Site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser beautifulsoup4 python-slugify jinja2 requests

      - name: Fetch RSS metadata
        run: python scripts/fetch_rss.py

      - name: Generate original articles (deterministic, no LLM)
        run: python scripts/generate_originals.py

      - name: Build site
        run: python scripts/build.py

      - name: Verify build output
        run: |
          test -f docs/index.html     || (echo "ERROR: docs/index.html missing"  && exit 1)
          test -f docs/streaming.html || (echo "ERROR: streaming.html missing"   && exit 1)
          test -f docs/sitemap.xml    || (echo "ERROR: sitemap.xml missing"      && exit 1)
          echo "Article count : $(find docs/articles -name '*.html' 2>/dev/null | wc -l)"
          echo "Category pages: $(find docs -maxdepth 1 -name '*.html' | wc -l)"

      - name: Commit site
        run: |
          git config user.name  "Streamic Bot"
          git config user.email "bot@thestreamic.in"
          git add docs/ data/*.json || true
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "build: auto-refresh [skip ci]"
            git pull --rebase origin main || true
            git push origin main
          fi
